<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Podręcznik Debiutów – Chess Arena</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:#0b1120;--navy2:#111d35;--navy3:#162040;
      --gold:#c9a84c;--gold2:#e8c96a;--white:#f0ece4;
      --muted:#8a9bbf;--border:rgba(201,168,76,0.18);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--navy);color:var(--white);font-family:'Crimson Pro',Georgia,serif;font-size:18px;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:repeating-conic-gradient(rgba(201,168,76,0.03) 0% 25%,transparent 0% 50%);background-size:60px 60px;pointer-events:none;z-index:0}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(11,17,32,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
    .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
    .nav-logo img{height:42px;width:42px;object-fit:contain;border-radius:8px}
    .nav-logo span{font-family:'Cinzel',serif;font-weight:700;font-size:1.1rem;color:var(--gold);letter-spacing:0.08em}
    .nav-back{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.1em;color:var(--muted);background:none;border:1px solid var(--border);border-radius:3px;padding:7px 16px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;text-decoration:none}
    .nav-back:hover{color:var(--gold);border-color:var(--gold)}
    .hero{position:relative;min-height:38vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 56px;z-index:1}
    .hero-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none}
    .hero-eyebrow{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.35em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;opacity:0;animation:fadeUp 0.8s 0.2s forwards}
    .hero h1{font-family:'Cinzel',serif;font-size:clamp(2rem,5vw,3.6rem);font-weight:900;line-height:1.12;color:var(--white);opacity:0;animation:fadeUp 0.8s 0.4s forwards}
    .hero h1 em{font-style:normal;color:var(--gold2)}
    .hero-sub{font-size:1rem;color:var(--muted);max-width:500px;line-height:1.7;margin-top:16px;font-weight:300;font-style:italic;opacity:0;animation:fadeUp 0.8s 0.6s forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .filter-bar{position:relative;z-index:1;max-width:900px;margin:0 auto 44px;padding:0 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center}
    .search-input{flex:1;min-width:220px;background:var(--navy2);border:1px solid var(--border);border-radius:4px;padding:12px 18px;color:var(--white);font-family:'Crimson Pro',serif;font-size:1rem;font-weight:300;transition:border-color 0.2s}
    .search-input:focus{outline:none;border-color:rgba(201,168,76,0.5)}
    .search-input::placeholder{color:var(--muted)}
    .filter-btn{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;padding:12px 18px;background:var(--navy2);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap}
    .filter-btn:hover,.filter-btn.active{color:var(--gold);border-color:rgba(201,168,76,0.5);background:rgba(201,168,76,0.06)}
    .main-layout{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:260px 1fr;gap:28px;align-items:start}
    @media(max-width:800px){.main-layout{grid-template-columns:1fr}.sidebar{display:none}}
    .sidebar{position:sticky;top:90px;background:var(--navy2);border:1px solid var(--border);border-radius:6px;padding:24px;max-height:calc(100vh - 110px);overflow-y:auto}
    .sidebar::-webkit-scrollbar{width:4px}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .sidebar-title{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.25em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:4px;cursor:pointer;transition:all 0.2s;margin-bottom:2px}
    .sidebar-item:hover{background:rgba(201,168,76,0.06)}
    .sidebar-item.active{background:rgba(201,168,76,0.1);border-left:2px solid var(--gold);padding-left:8px}
    .sidebar-eco{font-family:'Cinzel',serif;font-size:0.6rem;color:var(--gold);min-width:32px}
    .sidebar-name{font-size:0.85rem;color:var(--white);font-weight:300;line-height:1.3}
    .openings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
    .opening-card{background:var(--navy2);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color 0.3s,transform 0.3s;opacity:0;transform:translateY(20px);animation:fadeUp 0.5s forwards}
    .opening-card:hover{border-color:rgba(201,168,76,0.5);transform:translateY(-4px) !important}
    .card-board-wrap{padding:16px;background:var(--navy3);display:flex;justify-content:center;align-items:center}
    .card-info{padding:14px 18px 18px}
    .card-eco{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:5px}
    .card-name{font-family:'Cinzel',serif;font-size:0.9rem;font-weight:600;color:var(--white);margin-bottom:7px;line-height:1.3}
    .card-moves{font-size:0.78rem;color:var(--muted);font-family:'Courier New',monospace;line-height:1.6;white-space:pre}
    .card-tag{display:inline-block;margin-top:10px;padding:3px 10px;border-radius:20px;font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;border:1px solid}
    .tag-e4{color:#e8a84c;border-color:rgba(232,168,76,0.3);background:rgba(232,168,76,0.06)}
    .tag-d4{color:#4c9ee8;border-color:rgba(76,158,232,0.3);background:rgba(76,158,232,0.06)}
    .tag-other{color:#4caf7d;border-color:rgba(76,175,125,0.3);background:rgba(76,175,125,0.06)}
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:20px}
    .modal-backdrop.open{display:flex}
    .modal{background:var(--navy2);border:1px solid var(--border);border-radius:8px;max-width:820px;width:100%;position:relative;animation:fadeUp 0.3s ease forwards;max-height:90vh;overflow-y:auto}
    .modal-header{padding:28px 36px 22px;border-bottom:1px solid var(--border);background:var(--navy3)}
    .modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;transition:color 0.2s}
    .modal-close:hover{color:var(--gold)}
    .modal-eco{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
    .modal-name{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;color:var(--white)}
    .modal-body{padding:28px 36px;display:grid;grid-template-columns:1fr 1fr;gap:28px}
    @media(max-width:600px){.modal-body{grid-template-columns:1fr}}
    .modal-details{display:flex;flex-direction:column;gap:18px}
    .detail-label{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.25em;color:var(--gold);text-transform:uppercase;margin-bottom:7px}
    .detail-value{font-size:0.95rem;color:var(--white);font-weight:300;line-height:1.7}
    .moves-block{font-family:'Courier New',monospace;font-size:0.82rem;color:var(--muted);background:var(--navy3);padding:12px 14px;border-radius:4px;border:1px solid var(--border);line-height:1.9;white-space:pre}
    .stat-row{display:flex;gap:10px}
    .stat-box{flex:1;background:var(--navy3);border:1px solid var(--border);border-radius:4px;padding:12px 8px;text-align:center}
    .stat-num{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700}
    .stat-lbl{font-size:0.7rem;color:var(--muted);margin-top:3px}
    .c-white{color:var(--white)}.c-draw{color:var(--gold)}.c-black{color:var(--muted)}
    .empty-state{grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);font-style:italic}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <img src="chess-arena.png" alt="Chess Arena"/>
    <span>Chess Arena</span>
  </a>
  <a href="index.html" class="nav-back">← Powrót</a>
</nav>
<div class="hero">
  <div class="hero-glow"></div>
  <p class="hero-eyebrow">Chess Arena · Teoria</p>
  <h1>Podręcznik <em>Debiutów</em></h1>

</div>
<div class="filter-bar">
  <input class="search-input" type="text" id="search-input" placeholder="Szukaj debiutu... np. Sycylijski"/>

  <button class="filter-btn" data-filter="e4">1.e4</button>
  <button class="filter-btn" data-filter="d4">1.d4</button>
  <button class="filter-btn" data-filter="other">Inne</button>
</div>
<div class="main-layout">

    <div class="sidebar-title">Indeks</div>
    <div id="sidebar-list"></div>
  </aside>
  <div class="openings-grid" id="openings-grid"></div>
</div>
<div class="modal-backdrop" id="detail-modal">

    <div class="modal-body">

          <div class="stat-row">

            <div class="stat-box"><div class="stat-num c-draw" id="stat-d"></div><div class="stat-lbl">Remis</div></div>
            <div class="stat-box"><div class="stat-num c-black" id="stat-b"></div><div class="stat-lbl">Czarne</div></div>
          </div>
        </div>
        <div><div class="detail-label">Charakterystyka</div><div class="detail-value" id="modal-desc"></div></div>
      </div>
    </div>
  </div>
</div>

  let filtered=['...'].map((_,i)=>OPENINGS[i]);

  let activeFilter='all';

  function renderCards(data){
    const grid=document.getElementById('openings-grid');
    if(!data.length){grid.innerHTML='<div class="empty-state">Brak wyników. 🔍</div>';return;}
    grid.innerHTML=data.map((o,i)=>{
      const tc=o.category==='e4'?'tag-e4':o.category==='d4'?'tag-d4':'tag-other';
      const tl=o.category==='e4'?'1.e4':o.category==='d4'?'1.d4':'Inne';
      return `<div class="opening-card" style="animation-delay:${i*55}ms" onclick="openModal(${OPENINGS.indexOf(o)})">

      <div class="card-info">
        <div class="card-eco">${o.eco}</div>
        <div class="card-name">${o.name}</div>
        <div class="card-moves">${o.moves}</div>
        <span class="card-tag ${tc}">${tl}</span>
      </div>
    </div>`;
    }).join('');
  }

  function renderSidebar(data){
    document.getElementById('sidebar-list').innerHTML=data.map(o=>`

      <span class="sidebar-eco">${o.eco}</span>
      <span class="sidebar-name">${o.name}</span>

  }

  function openModal(idx){
    const o=OPENINGS[idx];
    document.getElementById('modal-eco').textContent=o.eco;
    document.getElementById('modal-name').textContent=o.name;
    document.getElementById('modal-moves').textContent=o.moves;
    document.getElementById('modal-desc').textContent=o.desc;
    document.getElementById('stat-w').textContent=o.white+'%';
    document.getElementById('stat-d').textContent=o.draws+'%';
    document.getElementById('stat-b').textContent=o.black+'%';
    document.getElementById('modal-board-wrap').innerHTML=o.svgModal;
    document.getElementById('detail-modal').classList.add('open');
    document.body.style.overflow='hidden';
    document.querySelectorAll('.sidebar-item').forEach((el,i)=>{el.classList.toggle('active',filtered[i]===o);});
  }

  function closeModal(){
    document.getElementById('detail-modal').classList.remove('open');
    document.body.style.overflow='';
  }

  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('detail-modal').addEventListener('click',e=>{if(e.target===document.getElementById('detail-modal'))closeModal();});

  function applyFilter(){

    });
    renderCards(filtered);renderSidebar(filtered);
  }

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');activeFilter=btn.dataset.filter;applyFilter();
    });
  });
  document.getElementById('search-input').addEventListener('input',applyFilter);

  renderCards(OPENINGS);
  renderSidebar(OPENINGS);
</script>
</body>
</html>
